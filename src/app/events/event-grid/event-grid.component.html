<mat-grid-list>
   @for (event of events; track event) {
   <mat-grid-tile>
      <mat-card>
         <mat-card-header>
            <mat-card-title>{{ event.title }}</mat-card-title>
            <mat-card-subtitle>{{ event.countryLocation }}</mat-card-subtitle>
         </mat-card-header>

         <mat-card-content>
            <p>{{ event.summary }}</p>
         </mat-card-content>

         <span></span>

         <mat-card-actions>
            <button>
               <mat-icon>home</mat-icon>
            </button>
         </mat-card-actions>
      </mat-card>
   </mat-grid-tile>
   } @empty {
      <p>There are no current events</p>
   }
</mat-grid-list>
