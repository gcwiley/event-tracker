<mat-list class="recent-events mat-elevation-z1">
    <span mat-subheader>Recent Events</span>
    @for (event of recentEvents; track event.id) {
    <mat-list-item lines="2">
       <span matListItemTitle>{{ event.title }}</span>
       <span matListItemLine>Added: {{ event.countryLocation }}</span>
    </mat-list-item>
    <mat-divider/>
    } @empty {
      <p>There are no recent events</p>
    }
 </mat-list>
